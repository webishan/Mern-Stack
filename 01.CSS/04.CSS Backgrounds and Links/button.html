<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Button</title>
    <style>
        *{
            box-sizing: border-box;
        }
        .btn{
            display: inline-block;
            background-color: #0a5ed7;
            padding: 15px 20px;
            color: #fff;
            font-family: Arial, Helvetica, sans-serif;
            border-radius: 10px;
            text-decoration: none;
            transition: all 0.3s;
            border: 1px solid #0a5ed7;
        }

        .btn:hover{
            border: 1px solid #0a5ed7;
            color: #0a5ed7;
            background-color: transparent;
        }

        .xl{
            width: 600px;
            text-align: center;
        }

        .block{
            width: 100%;
            text-align: center;
        }
    </style>
</head>
<body>
    <a href="" class="btn block">Primary</a>
</body>
</html>
